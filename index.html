<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Notes App</h1>

        <div class="note-form">
            <input
                type="text"
                id="noteInput"
                placeholder="Enter note..."
            >

            <button id="addBtn">
                Add Note
            </button>
        </div>

        <ul id="notesList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
