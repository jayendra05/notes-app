<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <div class="card">

            <h1>📝 Notes App</h1>
            <p class="subtitle">
                Capture ideas, organize work and stay productive
            </p>

            <div class="stats">
                Total Notes:
                <span id="noteCount">0</span>
            </div>

            <div class="input-section">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search notes..."
                >
            </div>

            <div class="input-section">
                <input
                    type="text"
                    id="noteInput"
                    placeholder="Write a new note..."
                >

                <button id="addBtn">
                    Add Note
                </button>
            </div>

            <div id="emptyState" class="empty-state">
                No notes available.
            </div>

            <ul id="notesList"></ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
